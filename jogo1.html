<!DOCTYPE html>
<html>

<head>
<title>Adivinhar Número</title>
</head>

<body style="text-align:center;font-family:Arial;background:black;color:white;">

<h1>🎯 Adivinhe o Número</h1>

<p>Escolha um número entre 1 e 10</p>

<input id="numero">

<button onclick="verificar()">Tentar</button>

<p id="resultado"></p>

<script>

let numeroSecreto = Math.floor(Math.random()*10)+1;

function verificar(){

let tentativa = document.getElementById("numero").value;

if(tentativa == numeroSecreto){

document.getElementById("resultado").innerHTML = "🎉 Você acertou!";

}else{

document.getElementById("resultado").innerHTML = "❌ Tente novamente";

}

}

</script>

</body>

</html>
